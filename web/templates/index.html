<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>财经日报雷达</title>
    <style>
        :root {
            --bg-a: #261046;
            --bg-b: #6e3bd1;
            --bg-c: #b58cff;
            --panel: rgba(255,255,255,.14);
            --panel-strong: rgba(255,255,255,.2);
            --border: rgba(255,255,255,.22);
            --text: #f7f3ff;
            --muted: rgba(247,243,255,.72);
            --ink: #1b1230;
            --accent: #f5d36d;
            --green: #8cf2bd;
            --red: #ff9cae;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 8%, rgba(218,190,255,.42), transparent 28%),
                radial-gradient(circle at 82% 18%, rgba(111,83,220,.55), transparent 32%),
                linear-gradient(135deg, var(--bg-a), var(--bg-b) 56%, var(--bg-c));
        }
        a { color: inherit; }
        .shell { display: grid; grid-template-columns: 420px 1fr; min-height: 100vh; }
        .sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: auto;
            padding: 22px;
            border-right: 1px solid var(--border);
            background: rgba(22, 11, 44, .38);
            backdrop-filter: blur(24px) saturate(135%);
        }
        .brand { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 18px; }
        h1 { margin: 0; font-size: 26px; letter-spacing: 0; }
        h2 { margin: 0; font-size: 18px; letter-spacing: 0; }
        h3 { margin: 0 0 10px; font-size: 15px; letter-spacing: 0; }
        p { margin: 6px 0 0; color: var(--muted); line-height: 1.55; }
        .status { display: inline-flex; align-items: center; gap: 8px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,.12); color: var(--muted); white-space: nowrap; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 14px var(--green); }
        .panel {
            border: 1px solid var(--border);
            background: var(--panel);
            border-radius: 8px;
            box-shadow: 0 20px 55px rgba(15, 5, 35, .18);
            backdrop-filter: blur(22px) saturate(135%);
        }
        .panel + .panel { margin-top: 16px; }
        .panel-header { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 16px 18px; border-bottom: 1px solid rgba(255,255,255,.16); }
        .panel-body { padding: 16px 18px; }
        .source-group { margin-bottom: 16px; }
        .source-group:last-child { margin-bottom: 0; }
        .source-group-title {
            margin: 0 0 8px;
            color: rgba(255,255,255,.78);
            font-size: 13px;
            font-weight: 700;
        }
        .source-group-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }
        .check-card {
            min-width: 0;
            min-height: 62px;
            display: flex;
            align-items: flex-start;
            gap: 7px;
            padding: 9px 8px;
            border: 1px solid rgba(255,255,255,.18);
            background: rgba(255,255,255,.1);
            border-radius: 8px;
            cursor: pointer;
        }
        .check-card input { margin: 2px 0 0; accent-color: var(--accent); flex: 0 0 auto; }
        .check-card div { min-width: 0; }
        .check-card span {
            display: block;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            line-height: 1.25;
            overflow-wrap: anywhere;
        }
        .check-card small {
            display: block;
            margin-top: 5px;
            color: rgba(255,255,255,.62);
            font-size: 11px;
            line-height: 1.2;
        }
        .main { padding: 24px; overflow: auto; }
        .hero {
            display: grid;
            grid-template-columns: 1.3fr .7fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .brief-grid, .stats-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
        .metric { padding: 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,.16); background: rgba(255,255,255,.12); }
        .metric strong { display: block; font-size: 24px; margin-bottom: 4px; }
        .btn {
            border: 1px solid rgba(255,255,255,.24);
            background: rgba(255,255,255,.14);
            color: var(--text);
            height: 36px;
            padding: 0 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }
        .btn.primary { background: #fff; color: var(--ink); border-color: #fff; }
        .inline-tools { display: flex; flex-wrap: wrap; gap: 8px; }
        .filters { display: grid; grid-template-columns: 1fr 180px 180px; gap: 10px; margin-bottom: 12px; }
        .field, .select {
            width: 100%;
            height: 38px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,.2);
            background: rgba(255,255,255,.14);
            color: #fff;
            padding: 0 12px;
        }
        .select option { color: #1b1230; }
        .article-table-wrap { overflow: auto; border-radius: 8px; border: 1px solid rgba(255,255,255,.16); }
        table { width: 100%; border-collapse: collapse; min-width: 1080px; background: rgba(255,255,255,.08); }
        th, td { padding: 11px 12px; border-bottom: 1px solid rgba(255,255,255,.12); text-align: left; vertical-align: top; font-size: 13px; }
        th { color: rgba(255,255,255,.7); font-weight: 700; background: rgba(255,255,255,.08); }
        .article-title { max-width: 360px; line-height: 1.45; }
        .tag, .mini-tag, .importance, .link-btn {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 3px 8px;
            border-radius: 7px;
            border: 1px solid rgba(255,255,255,.2);
            background: rgba(255,255,255,.12);
            font-size: 12px;
            margin: 2px;
            text-decoration: none;
        }
        .importance { background: rgba(245,211,109,.22); color: #fff3b0; }
        .importance.mid { background: rgba(140,242,189,.16); color: #c8ffe0; }
        .importance.low { background: rgba(255,255,255,.1); color: rgba(255,255,255,.68); }
        .link-btn { color: #fff; }
        .link-btn.missing { color: rgba(255,255,255,.55); }
        .chapter-list { display: grid; gap: 10px; }
        .chapter {
            border: 1px solid rgba(255,255,255,.16);
            background: rgba(255,255,255,.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .chapter-toggle {
            width: 100%;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 14px;
            border: 0;
            background: transparent;
            color: #fff;
            cursor: pointer;
            text-align: left;
        }
        .chapter-toggle span span { display: block; color: var(--muted); font-size: 12px; margin-top: 4px; }
        .chapter-detail { display: none; padding: 0 14px 14px; color: rgba(255,255,255,.82); line-height: 1.6; }
        .chapter.open .chapter-detail { display: grid; gap: 10px; }
        .report-preview {
            white-space: pre-wrap;
            min-height: 160px;
            margin: 0;
            padding: 14px;
            border-radius: 8px;
            background: rgba(15,5,35,.28);
            border: 1px solid rgba(255,255,255,.14);
            color: rgba(255,255,255,.86);
        }
        .empty { padding: 18px; color: var(--muted); }
        @media (max-width: 1180px) {
            .shell { grid-template-columns: 1fr; }
            .sidebar { position: relative; height: auto; }
            .hero { grid-template-columns: 1fr; }
        }
        @media (max-width: 720px) {
            .source-group-grid, .brief-grid, .stats-grid, .filters { grid-template-columns: 1fr; }
            .main, .sidebar { padding: 14px; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <aside class="sidebar">
            <div class="brand">
                <div>
                    <h1>财经日报雷达</h1>
                    <p>按媒体性质分类采集，可自行勾选来源。</p>
                </div>
                <div class="status"><span class="dot" id="statusDot"></span><span id="runtimeStatus">连接中</span></div>
            </div>

            <section class="panel">
                <div class="panel-header">
                    <div>
                        <h2>采集范围</h2>
                        <p>每组一行 3 个卡片，提升信息密度。</p>
                    </div>
                </div>
                <div class="panel-body">
                    <div id="sourceGrid"><div class="empty">正在读取来源配置...</div></div>
                </div>
            </section>
        </aside>

        <main class="main">
            <section class="hero">
                <div class="panel">
                    <div class="panel-header">
                        <div>
                            <h2>今日综合判断</h2>
                            <p>先看结论，再追溯原文；用于企业公关宣传选题、媒体观察和后续跟踪。</p>
                        </div>
                        <div class="inline-tools">
                            <button class="btn" onclick="previewReport()">生成预览</button>
                            <button class="btn primary" id="runBtn" onclick="startCrawl()">开始抓取</button>
                        </div>
                    </div>
                    <div class="panel-body">
                        <div class="brief-grid">
                            <div class="metric"><strong id="totalNews">0</strong><span>总线索</span></div>
                            <div class="metric"><strong id="recentNews">0</strong><span>近 24 小时</span></div>
                            <div class="metric"><strong id="topicCount">0</strong><span>共性话题</span></div>
                        </div>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-header"><h2>市场概览</h2></div>
                    <div class="panel-body">
                        <p id="marketBrief">国家统计局源会归入“市场数据 / 全球市场”，用于宏观变量与风险偏好判断。</p>
                    </div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-header">
                    <div>
                        <h2>文章明细与原文溯源</h2>
                        <p id="resultSummary">正在读取结果...</p>
                    </div>
                    <div class="inline-tools">
                        <button class="btn" onclick="refreshAll()">刷新</button>
                        <button class="btn" onclick="downloadExport('csv')">下载 CSV</button>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="filters">
                        <input class="field" id="searchInput" placeholder="搜索方向、关键词、公司、标题" oninput="renderNews()">
                        <select class="select" id="eventFilter" onchange="loadNews()"><option value="">全部类型</option></select>
                        <select class="select" id="industryFilter" onchange="loadNews()"><option value="">全部方向</option></select>
                    </div>
                    <div id="newsList" class="article-table-wrap"><div class="empty">暂无数据。</div></div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-header">
                    <div>
                        <h2>六大章节分析</h2>
                        <p>核心变化 / 关键事件 / 影响判断 / 后续关注</p>
                    </div>
                </div>
                <div class="panel-body">
                    <div class="chapter-list" id="chapterAnalysisList"></div>
                </div>
            </section>

            <section class="panel">
                <div class="panel-header">
                    <div>
                        <h2>日报预览</h2>
                        <p>生成后可下载 Markdown 报告。</p>
                    </div>
                    <div class="inline-tools">
                        <button class="btn" onclick="generateReport()">生成并保存</button>
                        <button class="btn" onclick="downloadExport('report')">下载报告</button>
                    </div>
                </div>
                <div class="panel-body">
                    <pre class="report-preview" id="reportPreview">点击“生成预览”查看今日结构化摘要。</pre>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_BASE = location.protocol === 'file:' ? 'http://127.0.0.1:5000' : '';
        const state = { config: null, dashboard: null, news: [], visibleNews: [], openChapter: 'global' };
        const sourceOrder = ['四大法披媒体', '官方公告 / 监管文件', '官方数据 / 宏观统计', '快讯 / 市场异动', '综合财经 / 深度报道', '科技产业 / 创投媒体', '市场数据 / 资金指标'];
        const chapters = [
            { id: 'ai', title: 'AI 应用 / AI Agent', subtitle: '落地场景、融资、企业付费', keywords: ['AI', '大模型', 'Agent', '算力'], follow: ['付费客户与续费率', '企业级产品发布', '头部平台生态变化'] },
            { id: 'semi', title: '半导体与 PCB', subtitle: '订单、报价、设备材料', keywords: ['半导体', 'PCB', '芯片', '晶圆', '封装'], follow: ['服务器链订单', 'PCB/覆铜板价格', '设备材料国产替代'] },
            { id: 'robot', title: '具身智能与机器人', subtitle: '产品、零部件、合作', keywords: ['机器人', '具身智能', '人形机器人'], follow: ['量产计划', '零部件订单', '战略合作'] },
            { id: 'ipo', title: 'IPO 与 A 股科技', subtitle: '审核、政策、风险偏好', keywords: ['IPO', '上市', '过会', 'A股', '科创'], follow: ['交易所审核动态', '监管规则变化', '科技板块成交'] },
            { id: 'hk', title: '港股科技板块', subtitle: '估值、资金、映射', keywords: ['港股', '恒生科技', '南向'], follow: ['南向资金', '平台公司业绩', 'A/H 科技映射'] },
            { id: 'global', title: '全球市场与宏观变量', subtitle: '统计局、美元、美股科技', keywords: ['统计局', 'CPI', 'PPI', 'PMI', '美元', '美股', '黄金', '原油'], follow: ['国家统计局数据发布', 'CPI/PPI/PMI', '人民币汇率', '美元与美债'] },
        ];

        window.addEventListener('load', refreshAll);

        async function api(path, options = {}) {
            const response = await fetch(`${API_BASE}${path}`, options);
            const data = await response.json();
            if (!response.ok || data.success === false) throw new Error(data.error || `HTTP ${response.status}`);
            return data;
        }

        async function refreshAll() {
            await loadConfig();
            await Promise.all([loadDashboard(), loadNews()]);
            setConnected(true);
        }

        async function loadConfig() {
            const res = await api('/api/config');
            state.config = res.data;
            renderSourceGroups(res.data.sources || []);
            document.getElementById('eventFilter').innerHTML = '<option value="">全部类型</option>' + (res.data.event_types || []).map(item => `<option value="${escapeAttr(item)}">${escapeHtml(item)}</option>`).join('');
            document.getElementById('industryFilter').innerHTML = '<option value="">全部方向</option>' + (res.data.monitor_topics || []).map(item => `<option value="${escapeAttr(item.name)}">${escapeHtml(item.name)}</option>`).join('');
        }

        function renderSourceGroups(sources) {
            const grouped = sources.reduce((acc, source) => {
                const group = source.group || '其他来源';
                if (!acc[group]) acc[group] = [];
                acc[group].push(source);
                return acc;
            }, {});
            const groups = [...sourceOrder, ...Object.keys(grouped).filter(group => !sourceOrder.includes(group))];
            document.getElementById('sourceGrid').innerHTML = groups.filter(group => grouped[group]?.length).map(group => `
                <section class="source-group">
                    <p class="source-group-title">${escapeHtml(group)}</p>
                    <div class="source-group-grid">
                        ${grouped[group].map(source => `
                            <label class="check-card">
                                <input type="checkbox" data-source-id="${escapeAttr(source.id)}" data-source-name="${escapeAttr(source.name)}" ${source.enabled ? 'checked' : ''}>
                                <div><span>${escapeHtml(source.name)}</span><small>${escapeHtml(source.type || '来源')}</small></div>
                            </label>
                        `).join('')}
                    </div>
                </section>
            `).join('');
        }

        async function loadDashboard() {
            const res = await api('/api/dashboard');
            state.dashboard = res.data;
            document.getElementById('totalNews').textContent = res.data.total_news || 0;
            document.getElementById('recentNews').textContent = res.data.recent_24h || 0;
            document.getElementById('topicCount').textContent = res.data.topics_count || 0;
            const summary = res.data.summary || {};
            document.getElementById('resultSummary').textContent = `已归并 ${summary.total || 0} 条线索，覆盖 ${Object.keys(summary.platform_counts || {}).length} 个来源。`;
        }

        async function loadNews() {
            const params = new URLSearchParams({ per_page: '100' });
            const eventType = document.getElementById('eventFilter')?.value || '';
            const industry = document.getElementById('industryFilter')?.value || '';
            if (eventType) params.set('event_type', eventType);
            if (industry) params.set('industry', industry);
            const res = await api(`/api/news?${params.toString()}`);
            state.news = res.data.news || [];
            renderNews();
            renderChapterAnalysis();
        }

        function renderNews() {
            const keyword = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
            state.visibleNews = state.news.filter(item => {
                if (!keyword) return true;
                return [item.title, item.source, item.content, item.category?.event_type, item.category?.industry, ...(item.tags || [])].join(' ').toLowerCase().includes(keyword);
            });
            if (!state.visibleNews.length) {
                document.getElementById('newsList').innerHTML = '<div class="empty">暂无匹配新闻。可以调整筛选，或点击“开始抓取”。</div>';
                return;
            }
            const rows = state.visibleNews.map(item => {
                const category = item.category || {};
                const companies = item.entities?.companies || [];
                const importance = getImportance(item);
                const hasUrl = item.url && !item.is_demo && !String(item.url).includes('example.com');
                return `<tr>
                    <td>${formatDateTime(item.publish_time)}</td>
                    <td><strong>${escapeHtml(item.source || '未知')}</strong></td>
                    <td><div class="article-title">${escapeHtml(item.title || '')}</div></td>
                    <td>${escapeHtml(category.event_type || '未分类')}</td>
                    <td>${escapeHtml(category.industry || '其他')}</td>
                    <td>${companies.slice(0,3).map(escapeHtml).join('、') || '未抽取'}</td>
                    <td><span class="importance ${importance.className}">${importance.label}</span></td>
                    <td>${(item.tags || []).slice(0,5).map(tag => `<span class="mini-tag">${escapeHtml(tag)}</span>`).join('')}</td>
                    <td>${hasUrl ? `<a class="link-btn" href="${escapeAttr(item.url)}" target="_blank" rel="noreferrer">阅读原文</a>` : '<span class="link-btn missing">链接待补充</span>'}</td>
                </tr>`;
            }).join('');
            document.getElementById('newsList').innerHTML = `<table>
                <thead><tr><th>发布时间</th><th>来源媒体</th><th>原文标题</th><th>新闻类型</th><th>所属赛道</th><th>主体/公司</th><th>重要性</th><th>标签</th><th>原文链接</th></tr></thead>
                <tbody>${rows}</tbody>
            </table>`;
        }

        function renderChapterAnalysis() {
            const news = state.visibleNews.length ? state.visibleNews : state.news;
            document.getElementById('chapterAnalysisList').innerHTML = chapters.map(chapter => {
                const matched = news.filter(item => chapter.keywords.some(word => [item.title, item.content, item.source, ...(item.tags || [])].join(' ').toLowerCase().includes(String(word).toLowerCase()))).slice(0, 4);
                const core = matched.length ? `今日捕捉到 ${matched.length} 条相关线索，重点关注 ${matched.map(item => item.category?.event_type).filter(Boolean).slice(0,2).join('、') || '事件变化'}。` : '暂无高相关线索，保持监控。';
                return `<article class="chapter ${state.openChapter === chapter.id ? 'open' : ''}">
                    <button class="chapter-toggle" onclick="toggleChapter('${chapter.id}')"><span><strong>${escapeHtml(chapter.title)}</strong><span>${escapeHtml(chapter.subtitle)}</span></span><span>›</span></button>
                    <div class="chapter-detail">
                        <div><b>今日核心变化：</b>${escapeHtml(core)}</div>
                        <div><b>关键事件：</b>${matched.map(item => escapeHtml(item.title)).join('；') || '暂无'}</div>
                        <div><b>影响判断：</b>结合来源权威性、事件类型和产业链映射判断研究价值，避免仅按标题热度下结论。</div>
                        <div><b>后续关注点：</b>${chapter.follow.map(escapeHtml).join('、')}</div>
                    </div>
                </article>`;
            }).join('');
        }

        function toggleChapter(id) {
            state.openChapter = state.openChapter === id ? '' : id;
            renderChapterAnalysis();
        }

        async function startCrawl() {
            const runBtn = document.getElementById('runBtn');
            runBtn.disabled = true;
            try {
                const sourceIds = Array.from(document.querySelectorAll('#sourceGrid input[data-source-id]:checked')).map(input => input.dataset.sourceId);
                const res = await api('/api/crawl/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source_ids: sourceIds }),
                });
                alert(`抓取完成：${res.data.articles_count} 条资讯。`);
                await refreshAll();
            } catch (error) {
                alert(`抓取失败：${error.message}`);
            } finally {
                runBtn.disabled = false;
            }
        }

        function previewReport() {
            const lines = ['# 财经科技日报预览', '', `当前线索：${state.news.length} 条`, '', ...state.news.slice(0, 8).map((item, index) => `${index + 1}. ${item.source}｜${item.title}`)];
            document.getElementById('reportPreview').textContent = lines.join('\n');
        }

        async function generateReport() {
            const res = await api('/api/report/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
            document.getElementById('reportPreview').textContent = res.data.report || '报告为空';
        }

        function downloadExport(type) {
            window.open(`${API_BASE}/api/export?type=${encodeURIComponent(type)}`, '_blank');
        }

        function setConnected(connected) {
            document.getElementById('runtimeStatus').textContent = connected ? '后端已连接' : '连接失败';
            document.getElementById('statusDot').style.background = connected ? 'var(--green)' : 'var(--red)';
        }

        function getImportance(item) {
            const score = Number(item.heat_score || 0);
            if (score >= 78) return { label: '高', className: '' };
            if (score >= 62) return { label: '中', className: 'mid' };
            return { label: '低', className: 'low' };
        }

        function formatDateTime(value) {
            if (!value) return '--';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return String(value);
            return date.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char]);
        }

        function escapeAttr(value) {
            return escapeHtml(value).replace(/`/g, '&#96;');
        }
    </script>
</body>
</html>
